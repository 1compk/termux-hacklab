          echo ""
          echo "=== ccache Stats ==="
          ccache -s 2>/dev/null | head -20
          
          echo ""
          echo "=== Kernel Sources Cache ==="
          du -sh /builder/armbian/sources/linux-kernel 2>/dev/null || echo "No kernel sources cached"
          
          echo ""
          echo "=== Armbian Build Cache ==="
          du -sh /builder/armbian/cache 2>/dev/null || echo "No build cache"
          
          echo ""
          echo "=== Prebuilt DEBs ==="
          du -sh /builder/armbian/output/debs 2>/dev/null || echo "No prebuilt debs"
          
          echo ""
          echo "=== Available Disk Space ==="
          df -h /builder | tail -1

      - name: Build | Armbian with Optimizations
        id: build
        working-directory: /builder/armbian
        run: |
          set -x
          
          sudo chown -R runner:runner /builder/armbian
          chmod +x compile.sh
          
          # Pre-export environment variables for build
          export CCACHE_SLOPPINESS="file_stat_matches,time_macros"
          export CCACHE_IGNOREHEADERS="/usr/include/sys/stat.h"
          
          # Run build with optimizations
          time ./compile.sh build \
            EXPERT=yes \
            BOARD=uefi-x86 \
            BRANCH=edge \
            RELEASE=forky \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=no \
            DESKTOP_APPGROUPS_SELECTED= \
            DESKTOP_ENVIRONMENT= \
            DESKTOP_ENVIRONMENT_CONFIG_NAME= \
            KERNEL_BTF=no \
            KERNEL_CONFIGURE=no \
            KERNEL_GIT=no \
            DOCKER_ARMBIAN=no \
            SKIP_ARMBIAN_CONFIG=yes \
            COMPRESS_OUTPUTIMAGE=gz \
            USE_CCACHE=yes \
            CCACHE_DIR=/home/runner/.ccache \
            BUILD_ALL=no \
            SHOW_LOG=no \
            EXTRAWIFI=no \
            WIREGUARD=no || {
              echo "Build failed! Checking logs..."
              tail -500 /builder/armbian/output/debug/*.log 2>/dev/null || true
              exit 1
            }
          
          set +x
          echo "build_status=success" >> ${GITHUB_OUTPUT}

      - name: Prepare | Save Build Statistics
        if: always()
        run: |
