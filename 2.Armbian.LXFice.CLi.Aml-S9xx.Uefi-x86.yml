  build-uefi-x86-cli:
    name: Build Armbian CLi Forky Uefi-x86
    runs-on: ubuntu-24.04
    timeout-minutes: 600
    steps:
      - name: Prepare | Get Date & Environment Info
        id: date
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "Available disk space:"
          df -h /mnt / | grep -E '^/|Filesystem'

      - name: Prepare | System Cleanup & Optimization
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -x
          
          # Disable unnecessary services
          sudo systemctl disable --now snapd.service snapd.socket 2>/dev/null || true
          sudo systemctl disable --now apt-daily.service apt-daily.timer 2>/dev/null || true
          
          # Clean system
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          sudo rm -rf /usr/share/doc/* /usr/share/man/*
          
          # Optimize system settings
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "${TZ:-Etc/GMT-7}"
          sudo -E timedatectl set-ntp true
          
          # Increase ulimits for build
          sudo sh -c 'echo "* soft nofile 65535" >> /etc/security/limits.conf'
          sudo sh -c 'echo "* hard nofile 65535" >> /etc/security/limits.conf'
          
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}
          set +x

      - name: Prepare | Pre-install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache \
            git \
            wget \
            curl \
            dosfstools \
            mtools \
            parted \
            e2fsprogs \
            fdisk \
            rsync \
            lsof \
            pv 2>&1 | tail -20

      - name: Prepare | Configure ccache
        run: |
          mkdir -p /home/runner/.ccache
          ccache -M ${CCACHE_MAXSIZE}
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache --set-config=sloppiness=file_stat_matches
          ccache -p
          ccache -z  # Reset stats

      - name: Prepare | Restore ccache from Cache
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: /home/runner/.ccache
          key: ccache-uefi-x86-${{ runner.os }}-${{ hashFiles('**/compile.sh') }}
          restore-keys: |
            ccache-uefi-x86-${{ runner.os }}-
            ccache-uefi-x86-

      - name: Prepare | Create Optimized Virtual Disk
        run: |
          set -x
          
          # Calculate available space
          available_root=$(df / | tail -1 | awk '{print int($4/1024)-10}')
          available_mnt=$(df /mnt | tail -1 | awk '{print int($4/1024)-10}')
          
          # Use 90% of available space, minimum 80GB each
          root_size=$((available_root > 80 ? available_root : 80))
          mnt_size=$((available_mnt > 80 ? available_mnt : 80))
          
          echo "Allocating: root=${root_size}GB, mnt=${mnt_size}GB"
          
          # Create and setup disk
          sudo truncate -s 100G /root.img
          sudo truncate -s 100G /mnt/mnt.img
          
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          
          # Single LV with 100% free space
          sudo lvcreate -n runner -l 100%FREE github
          
          # XFS with optimizations for large files
          sudo mkfs.xfs -f \
            -i sparse=0 \
            -b size=4096 \
            -d agcount=$(nproc) \
            -m crc=1 \
            /dev/github/runner
          
          # Mount with performance options
          sudo mkdir -p /builder
          sudo mount -o noatime,nodiratime,logbufs=8,logbsize=256k /dev/github/runner /builder
          
          sudo chown -R runner:runner /builder
          
          df -Th /builder
          set +x

      - name: Prepare | Clone Armbian Build System
        working-directory: /builder
        run: |
          set -x
          
          # Use full clone but with single branch
          git clone \
            --single-branch \
            --branch main \
            --filter=blob:none \
            https://github.com/1compk/armbian.build.git armbian
          
          cd armbian
          
          # Create necessary directories
          mkdir -p \
            output/images \
            output/debs \
            output/debug \
            sources/linux-kernel \
            cache/sources \
            cache/ccache \
            userpatches/overlay \
            userpatches/kernel/linux-uefi-x86 \
            ccache-stats
          
          # Setup permissions
          sudo chown -R runner:runner /builder/armbian
          chmod -R u+w /builder/armbian
          
          df -h .
          set +x

      - name: Prepare | Restore Kernel & Build Cache
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: |
            /builder/armbian/sources/linux-kernel
            /builder/armbian/cache
            /builder/armbian/output/debs
          key: armbian-kernel-uefi-x86-${{ runner.os }}-${{ hashFiles('**/compile.sh') }}
          restore-keys: |
            armbian-kernel-uefi-x86-${{ runner.os }}-edge-
            armbian-kernel-uefi-x86-${{ runner.os }}-
            armbian-kernel-uefi-x86-

      - name: Prepare | Display Cache Status
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║      CACHE STATUS BEFORE BUILD         ║"
