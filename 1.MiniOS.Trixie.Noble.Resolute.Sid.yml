name: 1. MiniOS LXFice Trixie Noble Resolute Sid

on:
  workflow_dispatch:

env:
  TZ: Etc/GMT-7
  IMAGE_SIZE: 100G
  BUILDER_DIR: /builder

jobs:
  build:
    name: MiniOS ${{ matrix.release }}
    runs-on: ubuntu-24.04
    timeout-minutes: 600

    strategy:
      fail-fast: false
      matrix:
        include:

          # ===== 05.2026 GROUP =====
          - release: trixie
            build_tar: zMiniOS.SkyLine.Build.05.2026.tar.xz
            build_dir: zMiniOS.SkyLine.Build.05.2026
            command: sudo -E ./minios-cmd -d trixie -a amd64 -de xfce -pv standard -c zstd -l en_US -tz "Etc/GMT-7" -kl -ib dracut

          - release: noble
            build_tar: zMiniOS.SkyLine.Build.05.2026.tar.xz
            build_dir: zMiniOS.SkyLine.Build.05.2026
            command: sudo -E ./minios-cmd -d noble -a amd64 -de xfce -pv standard -c zstd -l en_US -tz "Etc/GMT-7" -kl -ib dracut

          - release: resolute
            build_tar: zMiniOS.SkyLine.Build.05.2026.tar.xz
            build_dir: zMiniOS.SkyLine.Build.05.2026
            command: sudo -E ./minios-cmd -d resolute -a amd64 -de xfce -pv standard -c zstd -l en_US -tz "Etc/GMT-7" -kl -ib dracut

          # ===== SID (04.2026 BUILD) =====
          - release: sid
            build_tar: zMinios.Skyline.Build.04.2026.tar.xz
            build_dir: zMinios.Skyline.Build.04.2026
            command: sudo sh sid.xfce.build.sh

    steps:
      # =========================================
      # INIT
      # =========================================
      - name: Init
        run: |
          sudo timedatectl set-timezone "${TZ}"
          sudo swapoff -a || true

      # =========================================
      # APT CACHE
      # =========================================
      - name: Restore APT Cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: minios-apt-v2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap squashfs-tools xz-utils \
            xorriso mtools rsync grub-common \
            xfsprogs lvm2 pv wget

      # =========================================
      #  MiniOS LVM Disk (EXTREME)
      # =========================================
      - name: Create LVM Disk
        run: |
          set -e

          sudo truncate -s $IMAGE_SIZE /mnt.img
          sudo truncate -s $IMAGE_SIZE /root.img

          LOOP1=$(sudo losetup --find --show /mnt.img)
          LOOP2=$(sudo losetup --find --show /root.img)

          sudo pvcreate $LOOP1 $LOOP2
          sudo vgcreate github $LOOP1 $LOOP2
          sudo lvcreate -n runner -l 100%FREE github

          sudo mkfs.xfs -f \
            -b size=4096 \
            -d agcount=$(nproc) \
            /dev/github/runner

          sudo mkdir -p $BUILDER_DIR

          sudo mount -o noatime,nodiratime,logbufs=8,logbsize=256k \
            /dev/github/runner $BUILDER_DIR

          sudo chown -R runner:runner $BUILDER_DIR
          df -Th

      # =========================================
      # DOWNLOAD BUILD FILE
      # =========================================
      - name: Download Build Files
        working-directory: /builder
        run: |
          wget -q "https://github.com/1compk/minios/releases/download/live/${{ matrix.build_tar }}"
          tar -xf "${{ matrix.build_tar }}"

      # =========================================
      # BUILD
      # =========================================
      - name: Build MiniOS
        working-directory: /builder/${{ matrix.build_dir }}
        run: |
          set -e
          ${{ matrix.command }}

      # =========================================
      # UPLOAD
      # =========================================
      - name: Upload ISO
        uses: actions/upload-artifact@v7
        with:
          name: MiniOS-${{ matrix.release }}
          path: /builder/${{ matrix.build_dir }}/build/iso/*.iso
          retention-days: 30
          archive: false
